<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THREAD/3D - Streetwear Collection 2026</title>
    <meta name="description" content="A futuristic 3D T-Shirt showcase experience.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../cursor.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&family=Syne:wght@400;700;800&display=swap"
        rel="stylesheet">

    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Loading Screen -->
    <div id="loader" class="loader">
        <div class="loader-content">
            <div class="loader-text">INITIALIZING...</div>
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="percentage" id="percentage">0%</div>
        </div>
    </div>

    <!-- Navigation -->
    <nav>
        <div class="logo">THREAD/3D</div>
        <div class="cart">CART (0)</div>
    </nav>

    <!-- Parallax Background Text -->
    <div class="parallax-text-container">
        <h1 class="parallax-text">COLLECTION 2026 — FUTURE WEAR</h1>
    </div>

    <!-- 3D Canvas -->
    <canvas id="webgl"></canvas>

    <!-- UI Overlay for Product -->
    <div class="product-ui">
        <div class="product-info">
            <h2>CYBER / TEE</h2>
            <p class="price">$85.00</p>
            <p class="description">Engineered for the digital age. High-performance fabric with adaptive thermal
                regulation.</p>
        </div>

        <div class="color-swatches">
            <button class="swatch neon" data-color="#CCFF00" aria-label="Neon Lime"></button>
            <button class="swatch white" data-color="#F0F8FF" aria-label="Ghost White"></button>
            <button class="swatch onyx" data-color="#0A0A0A" aria-label="Onyx Black"></button>
        </div>

        <button class="add-btn">ADD T0 CART</button>
    </div>

    <div class="scroll-indicator">
        <span>SCROLL TO EXPLORE</span>
        <div class="line"></div>
    </div>

    <section class="content-section">
        <!-- Spacer for scroll interaction -->
    </section>

    <!-- Main Logic -->
    <script type="module" src="main.js"></script>
    <script src="../cursor.js" defer></script>
</body>

</html>
